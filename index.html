<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zest | Verified Herbal Medicine</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="bg-blur"></div>

    <nav>
        <div class="img-logo"><img src="assets-images/logo.png" alt="Zest"></div>
        <div class="nav-links">
            <button class="cart-btn" onclick="toggleCart()">Cart (0)</button>
        </div>
    </nav>

    <header>
        <h1 class="hero-text">Your one step closer to <i>nature's healing.</i></h1>
        <div class="search-container">
            <input type="text" id="herbSearch" placeholder="Search for 'Aloe', 'Lavender', 'Mint'...">
            <button onclick="searchPlants()">Search</button>
        </div>
    </header>

    <div id="cartSidebar" class="cart-sidebar">
        <button class="close-cart" onclick="toggleCart()">Close <i class="fa-solid fa-x"></i></button>
        <h2>Your Healing Kit</h2>
        <div id="cartItemsList"></div>
        <div class="cart-footer">
            <p>Total: KES <span id="cartTotal">0</span></p>
            <button id="checkoutBtn" class="buy-btn" style="width:100%">Checkout</button>
        </div>
    </div>

    <main>
        <div id="productGrid" class="product-grid">
            <p class="initial-msg">Enter a botanical name to verify its clinical data.</p>
        </div>
    </main>

    <footer>
        <div class="footer-top">
            <div class="footer-section">
                <h3>Support</h3>
                <a href="#">Contact Us</a>
                <a href="#">FAQs</a>
            </div>
            <div class="footer-section">
                <h3>Legal</h3>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms</a>
            </div>
            <div class="social-section">
                <h3>Follow Us</h3>
                <div class="social-icons">
                    <i class="fa-brands fa-instagram"></i>
                    <i class="fa-brands fa-facebook"></i>
                    <i class="fa-brands fa-twitter"></i>
                
                <a href="https://www.google.com/maps/search/menengai+house+2/@-1.2790822,36.8184585,16z?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D" target="_blank" rel="Menengai house 2">
                    <i class="fa-solid fa-location-dot"></i>
                </a>
                    </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Zest. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
